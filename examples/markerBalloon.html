<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Map Marker Balloon</title>
  <style>
    html, body { height: 100%; }
    body { margin: 0; }
  </style>
</head>
<body>

  <google-map id="map" zoom="12" center="35.658584,139.7454316" theme="dark"></google-map>

  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&language=en"></script>
  <script type="module">
    import { GoogleMapUtils } from '../dist/build.esm.js';

    (async () => {
      const map = document.querySelector('#map');
      const position = { lat: 35.658584, lng: 139.7454316 };

      // Reverse-geocode the position to get a human-readable address
      const address = await GoogleMapUtils.getAddressFromLatLng(position);

      // Place a marker with the address shown as a balloon
      await map.addMarker({
        image: 'image/face6.png',
        color: 'rgb(255,45,85)',
        size: 80,
        position,
        info: address,
      });
    })();
  </script>
</body>
</html>
